<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vodafone Cash – TG-Wolf</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0e0f11;
      --card-bg: #17191d;
      --primary: #ff0000;
      --accent: #ff4f4f;
      --error: #ff4f4f;
      --success: #2ecc71;
      --text: #ffffff;
      --input-bg: #24262b;
      --font-main: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-main);
      background-color: var(--bg-dark);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 80px 20px 20px;
    }
    .container {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.07);
      max-width: 360px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    .brand { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--primary); letter-spacing: 0.5px; }
    .subtitle { font-size: 14px; color: #bbb; margin-bottom: 18px; }
    .info-box { background-color: #1e2025; border-radius: 12px; padding: 8px 16px; margin: 0 auto 20px; font-size: 14px; max-width: 240px; display: flex; justify-content: center; align-items: center; gap: 6px; color: #ccc; }
    .info-box strong { color: #bbb; font-weight: 500; }
    #receiver-number { cursor: pointer; color: #eee; transition: color 0.2s ease; user-select: none; }
    #receiver-number:hover { color: var(--primary); }
    input[type="text"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid transparent; border-radius: 10px; background-color: var(--input-bg); color: var(--text); font-size: 15px; transition: all 0.25s ease; outline: none; }
    input:focus { border: 1.5px solid var(--primary); background-color: #2b2d32; box-shadow: 0 0 6px rgba(255, 0, 0, 0.12); transform: scale(1.01); }
    input::placeholder { color: #888; }
    button { background: linear-gradient(135deg, #ff1e1e, #cc0000); color: #000; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; width: 100%; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; margin-top: 35px; box-shadow: 0 0 10px rgba(255, 0, 0, 0.10); }
    button:hover { opacity: 0.93; transform: scale(1.02); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; font-size: 14px; border-radius: 10px; display: none; z-index: 9999; color: #fff; animation: fadeIn 0.3s ease; }
    .toast.success { background-color: var(--success); }
    .toast.error   { background-color: var(--error); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes loaderRingSpin { to { transform: rotate(360deg); } }
    .loader-ring { display: inline-block; vertical-align: middle; width: 12px; height: 12px; border: 2px solid currentColor; border-radius: 50%; border-top-color: transparent; animation: loaderRingSpin 0.8s linear infinite; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Vodafone Cash</div>
    <div class="subtitle">Recharge Portal</div>

    <div class="info-box" style="padding:8px 16px; max-width:240px; font-size:14px; display:flex; justify-content:center; align-items:center; gap:6px; margin:0 auto 18px; white-space:nowrap; flex-wrap:nowrap;">
      <strong style="flex:none;">Cash:</strong>
      <span id="receiver-number" style="cursor:pointer; user-select:none; flex:none;" onclick="navigator.clipboard.writeText(this.textContent).catch(()=>{});" title="Click to copy">01093191148</span>
      <span style="flex:none;">|</span>
      <span style="flex:none;">1$ = 58 EGP</span>
    </div>

    <input type="text" id="amount" placeholder="EGP amount" />
    <input type="text" id="number" placeholder="Sender's number e.g: 01041122334" />
    <button onclick="submitRecharge()">Verify Payment</button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const chatid = new URLSearchParams(location.search).get('id') || '';

    function showToast(msg, type = 'success') {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 4000);
    }

    function submitRecharge() {
      const amount = document.getElementById("amount").value.trim();
      const number = document.getElementById("number").value.trim();
      const button = document.querySelector("button");

      if (!amount || !number) {
        (!amount ? document.getElementById("amount") : document.getElementById("number")).focus();
        showToast("Please fill in all fields", "error");
        return;
      }
      if (parseInt(amount) < 58) {
        showToast("Minimum amount is 58 EGP", "error");
        return;
      }
      if (!chatid) {
        showToast("Invalid user ID", "error");
        return;
      }

      button.disabled = true;
      button.innerHTML = 'wait <span class="loader-ring"></span>';

      fetch('https://neat-cloths-relax.loca.lt/vodafone-topup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
        body: JSON.stringify({ user_id: chatid, amount_egp: parseInt(amount), sender_phone: number })
      })
        .then(r => r.json())
        .then(d => {
          if (d.status === 'ok') {
            showToast('Balance added: ' + d.usd + ' USD', 'success');
            document.getElementById("amount").value = '';
            document.getElementById("number").value = '';
          } else if (d.status === 'not_found') {
            showToast('No matching transaction found', 'error');
          } else if (d.status === 'duplicate') {
            showToast('Transaction already used', 'error');
          } else {
            showToast(d.msg || 'Recharge failed', 'error');
          }
        })
        .catch(() => showToast("Request failed. Try again.", "error"))
        .finally(() => {
          button.disabled = false;
          button.innerHTML = "Verify Payment";
        });
    }
  </script>
</body>
</html>
